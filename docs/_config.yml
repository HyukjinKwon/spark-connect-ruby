title: spark-connect (Ruby)
description: >-
  A production-ready, pure-Ruby client for Apache Spark Connect (gRPC),
  with a DataFrame API closely mirroring PySpark.

# GitHub Pages serves this project site under /spark-connect-ruby.
baseurl: "/spark-connect-ruby"
url: "https://hyukjinkwon.github.io"

# just-the-docs, pulled at build time so the site renders on GitHub Pages.
remote_theme: just-the-docs/just-the-docs

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

# --- Appearance ---------------------------------------------------------
color_scheme: dark

# A copy button on every fenced code block.
enable_copy_code_button: true

# Anchor links on headings, and a "Back to top" affordance on long pages.
heading_anchors: true
back_to_top: true
back_to_top_text: "Back to top"

# Render ```mermaid``` blocks (used for the architecture diagram).
mermaid:
  version: "10.9.1"

# --- Navigation ---------------------------------------------------------
nav_enabled: true
nav_external_links:
  - title: "API reference (YARD)"
    url: "https://hyukjinkwon.github.io/spark-connect-ruby/api/index.html"
  - title: "View on GitHub"
    url: "https://github.com/HyukjinKwon/spark-connect-ruby"
    hide_icon: false
  - title: "Gem on RubyGems"
    url: "https://rubygems.org/gems/spark-connect"

# --- Callout boxes (used as `{: .note }`, `{: .tip }`, etc.) -------------
callouts_level: quiet
callouts:
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green
  warning:
    title: Warning
    color: yellow
  important:
    title: Important
    color: purple

# --- Search -------------------------------------------------------------
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: true

# --- Top-right links ----------------------------------------------------
aux_links:
  "GitHub":
    - "https://github.com/HyukjinKwon/spark-connect-ruby"
  "RubyGems":
    - "https://rubygems.org/gems/spark-connect"
aux_links_new_tab: true

# --- Footer -------------------------------------------------------------
footer_content: >-
  Apache Spark, Spark, and the Spark logo are trademarks of the
  Apache Software Foundation. Licensed under Apache-2.0.
last_edit_timestamp: true
last_edit_time_format: "%Y-%m-%d"

# A "view on GitHub" / "edit this page" affordance.
gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/HyukjinKwon/spark-connect-ruby"
gh_edit_branch: "main"
gh_edit_source: docs
gh_edit_view_mode: "tree"

# The YARD API output (docs/api, generated by the Docs workflow) is published as
# static files at /api; only Jekyll plumbing is excluded from the build.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
