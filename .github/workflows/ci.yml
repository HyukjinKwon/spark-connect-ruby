name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: RuboCop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # bundler installs the gemspec's runtime deps (incl. red-arrow), which
      # build against the Apache Arrow GLib system libraries.
      - name: Install Apache Arrow (GLib) system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y -V ca-certificates lsb-release wget
          wget "https://apache.jfrog.io/artifactory/arrow/$(lsb_release --id --short | tr 'A-Z' 'a-z')/apache-arrow-apt-source-latest-$(lsb_release --codename --short).deb"
          sudo apt-get install -y -V "./apache-arrow-apt-source-latest-$(lsb_release --codename --short).deb"
          sudo apt-get update
          sudo apt-get install -y -V libarrow-glib-dev

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - run: bundle exec rubocop --parallel

  test:
    name: Unit specs (Ruby ${{ matrix.ruby }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.1", "3.2", "3.3", "3.4"]
    steps:
      - uses: actions/checkout@v4

      - name: Install Apache Arrow (GLib) system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y -V ca-certificates lsb-release wget
          wget "https://apache.jfrog.io/artifactory/arrow/$(lsb_release --id --short | tr 'A-Z' 'a-z')/apache-arrow-apt-source-latest-$(lsb_release --codename --short).deb"
          sudo apt-get install -y -V "./apache-arrow-apt-source-latest-$(lsb_release --codename --short).deb"
          sudo apt-get update
          sudo apt-get install -y -V libarrow-glib-dev libparquet-glib-dev

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Run unit specs
        run: bundle exec rake spec

  integration:
    name: Integration (live Spark Connect ${{ matrix.spark }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Spark 4.0.0+ ships only a Scala 2.13 build and bundles the Connect
        # server, so the default tarball works and no --packages is needed.
        #
        # Spark 3.5.x defaults to a Scala 2.12 build and does NOT bundle the
        # Connect server. Pulling spark-connect_2.13 onto a 2.12 runtime fails
        # with `NoClassDefFoundError: scala/collection/StringOps$`, so we must
        # use the Scala 2.13 distribution AND add the matching _2.13 package.
        include:
          - spark: "4.1.0"
            dist: spark-4.1.0-bin-hadoop3
            packages: ""
          - spark: "4.0.0"
            dist: spark-4.0.0-bin-hadoop3
            packages: ""
          - spark: "3.5.5"
            dist: spark-3.5.5-bin-hadoop3-scala2.13
            packages: "--packages org.apache.spark:spark-connect_2.13:3.5.5"
    steps:
      - uses: actions/checkout@v4

      - name: Install Apache Arrow (GLib) system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y -V ca-certificates lsb-release wget
          wget "https://apache.jfrog.io/artifactory/arrow/$(lsb_release --id --short | tr 'A-Z' 'a-z')/apache-arrow-apt-source-latest-$(lsb_release --codename --short).deb"
          sudo apt-get install -y -V "./apache-arrow-apt-source-latest-$(lsb_release --codename --short).deb"
          sudo apt-get update
          sudo apt-get install -y -V libarrow-glib-dev libparquet-glib-dev

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Cache Spark distribution
        id: spark-cache
        uses: actions/cache@v4
        with:
          path: ~/spark
          # Keyed on the distribution name so switching the 3.5.x tarball to the
          # Scala 2.13 build busts any stale Scala 2.12 cache entry.
          key: ${{ matrix.dist }}

      - name: Download Spark
        if: steps.spark-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/spark
          curl -fsSL "https://archive.apache.org/dist/spark/spark-${{ matrix.spark }}/${{ matrix.dist }}.tgz" \
            | tar xz -C ~/spark --strip-components=1

      - name: Start Spark Connect server
        run: |
          # Do NOT set SPARK_NO_DAEMONIZE: spark-daemon.sh treats any non-empty
          # value as "run in the foreground", which hangs this step forever.
          # Leaving it unset lets the server daemonize so the wait loop runs.
          ~/spark/sbin/start-connect-server.sh \
            ${{ matrix.packages }} \
            --conf spark.log.level=WARN
          # Wait for the gRPC port to accept connections.
          for i in $(seq 1 60); do
            if bash -c "</dev/tcp/localhost/15002" 2>/dev/null; then echo "Spark Connect up"; break; fi
            sleep 2
          done

      - name: Run integration specs
        env:
          SPARK_REMOTE: "sc://localhost:15002"
        run: bundle exec rspec spec/integration --format documentation

      - name: Dump server log on failure
        if: failure()
        run: tail -n 200 ~/spark/logs/*.out || true
