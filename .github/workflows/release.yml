name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write # for RubyGems trusted publishing (OIDC)

jobs:
  release:
    name: Build and publish gem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Apache Arrow (GLib) system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y -V ca-certificates lsb-release wget
          wget "https://apache.jfrog.io/artifactory/arrow/$(lsb_release --id --short | tr 'A-Z' 'a-z')/apache-arrow-apt-source-latest-$(lsb_release --codename --short).deb"
          sudo apt-get install -y -V "./apache-arrow-apt-source-latest-$(lsb_release --codename --short).deb"
          sudo apt-get update
          sudo apt-get install -y -V libarrow-glib-dev

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Verify version matches tag
        run: |
          GEM_VERSION="v$(ruby -r ./lib/spark_connect/version -e 'print SparkConnect::VERSION')"
          if [ "$GEM_VERSION" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match gem version ${GEM_VERSION}" >&2
            exit 1
          fi

      - name: Run unit specs
        run: bundle exec rake spec

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      # Publish via RubyGems trusted publishing (configure the gem's trusted
      # publisher in your RubyGems account; no API key secret required).
      # Best-effort: the GitHub release above still succeeds if trusted
      # publishing has not been configured yet.
      - name: Publish to RubyGems
        continue-on-error: true
        uses: rubygems/release-gem@v1
