name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write # for RubyGems trusted publishing (OIDC)

jobs:
  release:
    name: Build and publish gem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          # We can't use "bundler-cache: true" here because
          # rubygems-requirements-system isn't triggered when Bundler
          # cache is available.
          # bundler-cache: true

      # Always run "bundle install" manually to trigger
      # rubygems-requirements-system that install Apache Arrow GLib
      # automatically.
      - name: Install dependencies
        run: bundle install

      - name: Verify version matches tag
        run: |
          GEM_VERSION="v$(ruby -r ./lib/spark_connect/version -e 'print SparkConnect::VERSION')"
          if [ "$GEM_VERSION" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match gem version ${GEM_VERSION}" >&2
            exit 1
          fi

      - name: Run unit specs
        run: bundle exec rake spec

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true

      # Publish via RubyGems trusted publishing (configure the gem's trusted
      # publisher in your RubyGems account; no API key secret required).
      # Best-effort: the GitHub release above still succeeds if trusted
      # publishing has not been configured yet.
      - name: Publish to RubyGems
        continue-on-error: true
        uses: rubygems/release-gem@v1
