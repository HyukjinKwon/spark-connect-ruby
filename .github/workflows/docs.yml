name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "lib/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site (Jekyll guides + YARD API)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          # We can't use "bundler-cache: true" here because
          # rubygems-requirements-system isn't triggered when Bundler
          # cache is available.
          # bundler-cache: true

      # Always run "bundle install" manually to trigger
      # rubygems-requirements-system that install Apache Arrow GLib
      # automatically.
      - name: Install dependencies
        run: bundle install

      - name: Build YARD API documentation
        run: bundle exec yard doc --output-dir docs/api

      - uses: actions/configure-pages@v5

      - name: Build Jekyll site
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - uses: actions/upload-pages-artifact@v3

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
